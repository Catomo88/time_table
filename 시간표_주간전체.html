<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="alternate icon" href="favicon-32.png" sizes="32x32">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<title>주간 전체 시간표 (첫째+둘째)</title>
<style>
  :root{
    --c1:#2e8b57;--c1bg:#e7f4ec;--c1bd:#2e8b57;
    --c2:#2f6fc0;--c2bg:#e7f0fb;--c2bd:#2f6fc0;
    --ink:#1f2328;--muted:#6b7280;--line:#dfe3e7;
  }
  *{box-sizing:border-box}
  body{font-family:'Apple SD Gothic Neo','Malgun Gothic',-apple-system,Arial,sans-serif;color:var(--ink);margin:0;background:#f4f5f7}
  .wrap{max-width:1180px;margin:0 auto;padding:16px 14px 40px}
  h1{font-size:21px;margin:0 0 2px;font-weight:800}
  .date{color:var(--muted);font-size:13px;margin-bottom:10px}
  .legend{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:6px;font-size:12.5px}
  .legend b{padding:4px 11px;border-radius:20px;color:#fff;font-size:12.5px}
  .hint{font-size:11.5px;color:var(--muted);margin:6px 0 12px}
  .scroll{overflow-x:auto;background:#fff;border:1px solid var(--line);border-radius:14px;padding:12px}
  .grid{display:grid;grid-template-columns:52px repeat(5,minmax(180px,1fr));min-width:960px;position:relative}
  .colhead{text-align:center;font-weight:800;font-size:16px;padding:7px 0 3px;border-bottom:1px solid var(--line)}
  .lanehd{display:grid;grid-template-columns:1fr 1fr;font-size:11.5px;font-weight:800;border-bottom:2px solid var(--line)}
  .lanehd .a{color:var(--c1)} .lanehd .b{color:var(--c2)}
  .lanehd div{padding:3px 0}
  .timecol{position:relative}
  .daycol{position:relative;display:grid;grid-template-columns:1fr 1fr;border-left:1px solid var(--line)}
  .lane{position:relative}
  .lane.b{border-left:1px dashed #e8ebee}
  .hourline{position:absolute;left:0;right:0;border-top:1px solid #eef0f2}
  .hourlabel{position:absolute;right:6px;font-size:11px;color:var(--muted);transform:translateY(-7px)}
  .block{position:absolute;left:3px;right:3px;border-radius:8px;border-left:6px solid;padding:5px 6px;overflow:hidden;font-size:12px;line-height:1.25}
  .block .n{font-weight:800;font-size:12.5px;word-break:keep-all;overflow-wrap:anywhere}
  .block .tm{font-size:11px;opacity:.85;margin-top:1px}
  .a .block{background:var(--c1bg);border-color:var(--c1bd);color:#1c5a38}
  .b .block{background:var(--c2bg);border-color:var(--c2bd);color:#1b4682}
  .block.together{outline:2px dashed #e07b2e;outline-offset:-2px}
  .pbtn{margin-top:16px}
  .pbtn button{font-size:13px;padding:9px 15px;border:1px solid #ccc;background:#fff;border-radius:10px;cursor:pointer;font-weight:700}
  @media print{body{background:#fff}.wrap{max-width:none}.scroll{overflow:visible;border:none;padding:0}.pbtn,.hint{display:none}@page{size:landscape}}
</style>
</head>
<body>
<div class="wrap">
<h1>주간 전체 시간표 — 첫째 + 둘째 한눈에</h1>
<div class="date">2026.03</div>
<div class="legend">
  <b style="background:var(--c1)">첫째 · 초등</b>
  <b style="background:var(--c2)">둘째 · 어린이집</b>
  <span style="color:#c1671c;font-weight:700">┄ 주황 점선 = 둘이 함께(태권도)</span>
</div>
<div class="hint">※ 모바일에서는 표를 좌우로 넘겨 보세요. 인쇄 시 가로 방향.</div>
<div class="scroll"><div class="grid" id="grid"></div></div>
<div class="pbtn"><button onclick="window.print()">🖨 인쇄 / PDF 저장</button></div>
</div>
<script>
var DATA = [{"who": "첫째", "day": "월", "s": "08:20", "e": "08:45", "title": "등교", "cat": "care", "place": "집→학교", "assumed": false, "note": ""}, {"who": "첫째", "day": "월", "s": "08:45", "e": "13:30", "title": "정규수업", "cat": "school", "place": "○○초", "assumed": false, "note": ""}, {"who": "첫째", "day": "월", "s": "13:50", "e": "15:20", "title": "방과후 회화미술", "cat": "after", "place": "학교", "assumed": false, "note": ""}, {"who": "첫째", "day": "월", "s": "15:50", "e": "16:20", "title": "한글수업", "cat": "academy", "place": "한글교실", "assumed": false, "note": ""}, {"who": "첫째", "day": "화", "s": "08:20", "e": "08:45", "title": "등교", "cat": "care", "place": "집→학교", "assumed": false, "note": ""}, {"who": "첫째", "day": "화", "s": "08:45", "e": "13:30", "title": "정규수업", "cat": "school", "place": "○○초", "assumed": false, "note": ""}, {"who": "첫째", "day": "화", "s": "14:00", "e": "15:00", "title": "태권도", "cat": "academy", "place": "태권도장", "assumed": false, "note": "둘째와 함께 · 이모님(첫째 하교→둘째 하원→태권도)"}, {"who": "첫째", "day": "화", "s": "16:00", "e": "16:30", "title": "피아노", "cat": "academy", "place": "피아노학원", "assumed": false, "note": ""}, {"who": "첫째", "day": "수", "s": "08:20", "e": "08:45", "title": "등교", "cat": "care", "place": "집→학교", "assumed": false, "note": ""}, {"who": "첫째", "day": "수", "s": "08:45", "e": "12:50", "title": "정규수업(단축)", "cat": "school", "place": "○○초", "assumed": false, "note": ""}, {"who": "첫째", "day": "수", "s": "13:00", "e": "14:00", "title": "태권도", "cat": "academy", "place": "태권도장", "assumed": false, "note": ""}, {"who": "첫째", "day": "목", "s": "08:20", "e": "08:45", "title": "등교", "cat": "care", "place": "집→학교", "assumed": false, "note": ""}, {"who": "첫째", "day": "목", "s": "08:45", "e": "13:30", "title": "정규수업", "cat": "school", "place": "○○초", "assumed": false, "note": ""}, {"who": "첫째", "day": "목", "s": "13:40", "e": "15:10", "title": "방과후 메이키메이커", "cat": "after", "place": "학교", "assumed": false, "note": ""}, {"who": "첫째", "day": "목", "s": "17:10", "e": "17:40", "title": "한글수업", "cat": "academy", "place": "한글교실", "assumed": false, "note": ""}, {"who": "첫째", "day": "금", "s": "08:20", "e": "08:45", "title": "등교", "cat": "care", "place": "집→학교", "assumed": false, "note": ""}, {"who": "첫째", "day": "금", "s": "08:45", "e": "12:50", "title": "정규수업(단축)", "cat": "school", "place": "○○초", "assumed": false, "note": ""}, {"who": "첫째", "day": "금", "s": "12:50", "e": "14:20", "title": "방과후 종이접기", "cat": "after", "place": "학교", "assumed": false, "note": ""}, {"who": "첫째", "day": "금", "s": "15:00", "e": "16:00", "title": "미술학원", "cat": "academy", "place": "미술학원", "assumed": false, "note": "새로 추가"}, {"who": "첫째", "day": "금", "s": "16:00", "e": "17:00", "title": "태권도", "cat": "academy", "place": "태권도장", "assumed": false, "note": "둘째와 함께 · 이모님 픽업"}, {"who": "둘째", "day": "월", "s": "09:10", "e": "13:50", "title": "어린이집", "cat": "school", "place": "어린이집", "assumed": false, "note": ""}, {"who": "둘째", "day": "월", "s": "16:20", "e": "16:50", "title": "한글수업", "cat": "academy", "place": "한글교실", "assumed": false, "note": ""}, {"who": "둘째", "day": "화", "s": "09:10", "e": "13:50", "title": "어린이집", "cat": "school", "place": "어린이집", "assumed": false, "note": "태권도 위해 일찍 하원 (확인 필요)"}, {"who": "둘째", "day": "화", "s": "14:00", "e": "15:00", "title": "태권도", "cat": "academy", "place": "태권도장", "assumed": false, "note": "첫째와 함께 · 이모님 픽업"}, {"who": "둘째", "day": "수", "s": "09:10", "e": "13:50", "title": "어린이집", "cat": "school", "place": "어린이집", "assumed": false, "note": ""}, {"who": "둘째", "day": "수", "s": "16:30", "e": "17:00", "title": "한글수업", "cat": "academy", "place": "한글교실", "assumed": false, "note": ""}, {"who": "둘째", "day": "목", "s": "09:10", "e": "13:50", "title": "어린이집", "cat": "school", "place": "어린이집", "assumed": false, "note": ""}, {"who": "둘째", "day": "금", "s": "09:10", "e": "15:30", "title": "어린이집", "cat": "school", "place": "어린이집", "assumed": false, "note": "하원 시간 늘림"}, {"who": "둘째", "day": "금", "s": "16:00", "e": "17:00", "title": "태권도", "cat": "academy", "place": "태권도장", "assumed": false, "note": "첫째와 함께 · 이모님 픽업"}];
var DAYS=["월","화","수","목","금"];
var GS=8*60,GE=18*60,PXMIN=1.7;
function toMin(t){var a=t.split(":");return (+a[0])*60+(+a[1]);}
function build(){
  var grid=document.getElementById("grid");grid.innerHTML="";
  var ch=document.createElement("div");ch.className="colhead";grid.appendChild(ch);
  DAYS.forEach(function(d){var h=document.createElement("div");h.className="colhead";
    h.innerHTML=d+'<div class="lanehd"><div class="a">첫째</div><div class="b">둘째</div></div>';grid.appendChild(h);});
  var H=(GE-GS)*PXMIN;
  var tc=document.createElement("div");tc.className="timecol";tc.style.height=H+"px";
  for(var h=8;h<=18;h++){var y=(h*60-GS)*PXMIN;
    var l=document.createElement("div");l.className="hourline";l.style.top=y+"px";tc.appendChild(l);
    var lb=document.createElement("div");lb.className="hourlabel";lb.style.top=y+"px";lb.textContent=h+":00";tc.appendChild(lb);}
  grid.appendChild(tc);
  DAYS.forEach(function(day){
    var col=document.createElement("div");col.className="daycol";col.style.height=H+"px";
    [["첫째","a"],["둘째","b"]].forEach(function(W){
      var lane=document.createElement("div");lane.className="lane "+W[1];lane.style.height=H+"px";
      for(var h=8;h<=18;h++){var l=document.createElement("div");l.className="hourline";l.style.top=(h*60-GS)*PXMIN+"px";lane.appendChild(l);}
      var it=DATA.filter(function(x){return x.day===day&&x.who===W[0];}).map(function(x){return {a:x,sm:toMin(x.s),em:toMin(x.e)};}).sort(function(a,b){return a.sm-b.sm;});
      it.forEach(function(o){
        var b=document.createElement("div");b.className="block"+(o.a.note&&o.a.note.indexOf("함께")>=0?" together":"");
        b.style.top=(o.sm-GS)*PXMIN+"px";b.style.height=Math.max((o.em-o.sm)*PXMIN-3,30)+"px";
        b.innerHTML='<div class="n">'+o.a.title+'</div><div class="tm">'+o.a.s+'–'+o.a.e+'</div>';
        lane.appendChild(b);
      });
      col.appendChild(lane);
    });
    grid.appendChild(col);
  });
}
build();
</script>
</body>
</html>
