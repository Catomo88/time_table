<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="alternate icon" href="favicon-32.png" sizes="32x32">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<title>주간 전체 시간표 (첫째+둘째)</title>
<style>
  :root{--c1:#2e8b57;--c1bg:#e7f4ec;--c2:#2f6fc0;--c2bg:#e7f0fb;--ink:#1f2328;--muted:#6b7280;--line:#dfe3e7;--wk:#7b53c6;}
  *{box-sizing:border-box}
  body{font-family:'Apple SD Gothic Neo','Malgun Gothic',-apple-system,Arial,sans-serif;color:var(--ink);margin:0;background:#f4f5f7}
  .wrap{max-width:1100px;margin:0 auto;padding:12px 10px 32px}
  h1{font-size:18px;margin:0 0 2px;font-weight:800}
  .date{color:var(--muted);font-size:12px;margin-bottom:8px}
  .modes{display:inline-flex;background:#e9ebee;border-radius:11px;padding:3px;margin-bottom:8px}
  .modes button{border:none;background:none;font-weight:800;font-size:12.5px;padding:6px 13px;border-radius:9px;cursor:pointer;color:#666}
  .modes button.on{background:#fff;color:var(--ink);box-shadow:0 1px 2px rgba(0,0,0,.1)}
  .wkbar{font-size:12px;background:#f1ecfb;color:#5b3aa6;border:1px solid #e0d5f7;border-radius:9px;padding:7px 10px;margin-bottom:9px;font-weight:700;display:none}
  .legend{display:flex;flex-wrap:wrap;gap:7px;align-items:center;margin-bottom:5px;font-size:11.5px}
  .legend b{padding:3px 9px;border-radius:20px;color:#fff;font-size:11.5px}
  .hint{font-size:10.5px;color:var(--muted);margin:5px 0 10px}
  .scroll{overflow-x:auto;background:#fff;border:1px solid var(--line);border-radius:12px;padding:8px}
  .grid{display:grid;grid-template-columns:38px repeat(7,minmax(104px,1fr));min-width:766px;position:relative}
  .colhead{text-align:center;font-weight:800;font-size:13px;padding:4px 0 2px;border-bottom:1px solid var(--line)}
  .colhead.wknd{color:#c0392b}
  .lanehd{display:grid;grid-template-columns:1fr 1fr;font-size:10px;font-weight:800;border-bottom:2px solid var(--line)}
  .lanehd .a{color:var(--c1)} .lanehd .b{color:var(--c2)}
  .lanehd div{padding:2px 0}
  .timecol{position:relative}
  .daycol{position:relative;display:grid;grid-template-columns:1fr 1fr;border-left:1px solid var(--line)}
  .lane{position:relative}
  .lane.b{border-left:1px dashed #eceef1}
  .hourline{position:absolute;left:0;right:0;border-top:1px solid #f0f1f3}
  .hourlabel{position:absolute;right:3px;font-size:9.5px;color:var(--muted);transform:translateY(-6px)}
  .block{position:absolute;left:2px;right:2px;border-radius:6px;border-left:4px solid;padding:2px 4px;overflow:hidden;line-height:1.12}
  .block .n{font-weight:800;font-size:10px;word-break:keep-all;overflow-wrap:anywhere}
  .block .tm{font-size:8.5px;opacity:.85}
  .a .block{background:var(--c1bg);border-color:var(--c1)}.a .block .n{color:#1c5a38}
  .b .block{background:var(--c2bg);border-color:var(--c2)}.b .block .n{color:#1b4682}
  .block.together{outline:1.5px dashed #e07b2e;outline-offset:-1.5px}
  .block.wkadd{outline:2px solid var(--wk);outline-offset:-2px}
  .block.ghost{background:#f1f2f4;border-color:#cfd4da;opacity:.8}
  .block.ghost .n{text-decoration:line-through;color:#9aa0a6}
  .wktag{display:inline-block;font-size:8px;font-weight:800;color:#fff;background:var(--wk);border-radius:7px;padding:0 4px;margin-left:2px}
  .wktag.c{background:#9aa0a6}
  .pbtn{margin-top:12px}
  .pbtn button{font-size:12px;padding:7px 13px;border:1px solid #ccc;background:#fff;border-radius:9px;cursor:pointer;font-weight:700}
  @media print{body{background:#fff}.wrap{max-width:none}.scroll{overflow:visible;border:none;padding:0}.pbtn,.hint,.modes{display:none}@page{size:landscape}}
</style>
</head>
<body>
<div class="wrap">
<h1>주간 전체 시간표 — 첫째 + 둘째</h1>
<div class="date" id="hdate">2026.03</div>
<div class="modes">
  <button id="m-week" class="on" onclick="setMode('week')">이번 주</button>
  <button id="m-base" onclick="setMode('base')">기본 시간표</button>
</div>
<div class="wkbar" id="wkbar"></div>
<div class="legend">
  <b style="background:var(--c1)">첫째 · 초등</b>
  <b style="background:var(--c2)">둘째 · 어린이집</b>
  <span style="color:#c1671c;font-weight:700">┄ 함께(태권도)</span>
  <span style="color:#5b3aa6;font-weight:700">■ 이번 주 변경</span>
</div>
<div class="hint">※ 모바일은 좌우로 넘겨 보세요. 첼로는 수/토 중 하나.</div>
<div class="scroll"><div class="grid" id="grid"></div></div>
<div class="pbtn"><button onclick="window.print()">🖨 인쇄 / PDF 저장</button></div>
</div>
<script>
var DATA = [{"who": "첫째", "day": "월", "s": "08:20", "e": "08:45", "title": "등교", "cat": "care", "place": "집→학교", "assumed": false, "note": ""}, {"who": "첫째", "day": "월", "s": "08:45", "e": "13:30", "title": "정규수업", "cat": "school", "place": "○○초", "assumed": false, "note": ""}, {"who": "첫째", "day": "월", "s": "13:50", "e": "15:20", "title": "방과후 회화미술", "cat": "after", "place": "학교", "assumed": false, "note": ""}, {"who": "첫째", "day": "월", "s": "15:50", "e": "16:20", "title": "한글수업", "cat": "academy", "place": "한글교실", "assumed": false, "note": ""}, {"who": "첫째", "day": "화", "s": "08:20", "e": "08:45", "title": "등교", "cat": "care", "place": "집→학교", "assumed": false, "note": ""}, {"who": "첫째", "day": "화", "s": "08:45", "e": "13:30", "title": "정규수업", "cat": "school", "place": "○○초", "assumed": false, "note": ""}, {"who": "첫째", "day": "화", "s": "14:00", "e": "15:00", "title": "태권도", "cat": "academy", "place": "태권도장", "assumed": false, "note": ""}, {"who": "첫째", "day": "화", "s": "16:00", "e": "16:30", "title": "피아노", "cat": "academy", "place": "피아노학원", "assumed": false, "note": ""}, {"who": "첫째", "day": "수", "s": "08:20", "e": "08:45", "title": "등교", "cat": "care", "place": "집→학교", "assumed": false, "note": ""}, {"who": "첫째", "day": "수", "s": "08:45", "e": "12:50", "title": "정규수업(단축)", "cat": "school", "place": "○○초", "assumed": false, "note": ""}, {"who": "첫째", "day": "수", "s": "13:00", "e": "14:00", "title": "태권도", "cat": "academy", "place": "태권도장", "assumed": false, "note": ""}, {"who": "첫째", "day": "목", "s": "08:20", "e": "08:45", "title": "등교", "cat": "care", "place": "집→학교", "assumed": false, "note": ""}, {"who": "첫째", "day": "목", "s": "08:45", "e": "13:30", "title": "정규수업", "cat": "school", "place": "○○초", "assumed": false, "note": ""}, {"who": "첫째", "day": "목", "s": "13:40", "e": "15:10", "title": "방과후 메이키메이커", "cat": "after", "place": "학교", "assumed": false, "note": ""}, {"who": "첫째", "day": "목", "s": "17:10", "e": "17:40", "title": "한글수업", "cat": "academy", "place": "한글교실", "assumed": false, "note": ""}, {"who": "첫째", "day": "금", "s": "08:20", "e": "08:45", "title": "등교", "cat": "care", "place": "집→학교", "assumed": false, "note": ""}, {"who": "첫째", "day": "금", "s": "08:45", "e": "12:50", "title": "정규수업(단축)", "cat": "school", "place": "○○초", "assumed": false, "note": ""}, {"who": "첫째", "day": "금", "s": "12:50", "e": "14:20", "title": "방과후 종이접기", "cat": "after", "place": "학교", "assumed": false, "note": ""}, {"who": "첫째", "day": "금", "s": "14:40", "e": "16:00", "title": "미술학원", "cat": "academy", "place": "미술학원", "assumed": false, "note": ""}, {"who": "첫째", "day": "금", "s": "16:00", "e": "17:00", "title": "태권도", "cat": "academy", "place": "태권도장", "assumed": false, "note": "둘째와 함께 · 이모님 픽업"}, {"who": "둘째", "day": "월", "s": "09:10", "e": "15:30", "title": "어린이집", "cat": "school", "place": "어린이집", "assumed": false, "note": ""}, {"who": "둘째", "day": "월", "s": "16:20", "e": "16:50", "title": "한글수업", "cat": "academy", "place": "한글교실", "assumed": false, "note": ""}, {"who": "둘째", "day": "화", "s": "09:10", "e": "15:30", "title": "어린이집", "cat": "school", "place": "어린이집", "assumed": false, "note": ""}, {"who": "둘째", "day": "수", "s": "09:10", "e": "14:10", "title": "어린이집", "cat": "school", "place": "어린이집", "assumed": false, "note": ""}, {"who": "둘째", "day": "수", "s": "16:30", "e": "17:00", "title": "한글수업", "cat": "academy", "place": "한글교실", "assumed": false, "note": ""}, {"who": "둘째", "day": "목", "s": "09:10", "e": "13:50", "title": "어린이집", "cat": "school", "place": "어린이집", "assumed": false, "note": ""}, {"who": "둘째", "day": "금", "s": "09:10", "e": "15:30", "title": "어린이집", "cat": "school", "place": "어린이집", "assumed": false, "note": "하원 시간 늘림"}, {"who": "둘째", "day": "금", "s": "16:00", "e": "17:00", "title": "태권도", "cat": "academy", "place": "태권도장", "assumed": false, "note": "첫째와 함께 · 이모님 픽업"}, {"who": "첫째", "day": "수", "s": "19:40", "e": "20:10", "title": "첼로", "cat": "academy", "place": "첼로교실", "assumed": false, "note": "수/토 중 하나 (주말 일정에 따라 변동)"}, {"who": "첫째", "day": "토", "s": "09:30", "e": "10:00", "title": "첼로", "cat": "academy", "place": "첼로교실", "assumed": false, "note": "수/토 중 하나 (주말 일정에 따라 변동)"}, {"who": "첫째", "day": "일", "s": "15:00", "e": "16:00", "title": "수영", "cat": "academy", "place": "수영장", "assumed": false, "note": ""}, {"who": "둘째", "day": "목", "s": "14:30", "e": "15:00", "title": "축구", "cat": "academy", "place": "축구교실", "assumed": false, "note": ""}, {"who": "첫째", "day": "화", "s": "18:30", "e": "19:00", "title": "화상영어", "cat": "academy", "place": "온라인", "assumed": false, "note": ""}, {"who": "첫째", "day": "금", "s": "18:30", "e": "19:00", "title": "화상영어", "cat": "academy", "place": "온라인", "assumed": false, "note": ""}];
var OVERRIDES = {"2026-06-22": [{"op": "remove", "match": {"who": "둘째", "day": "목", "title": "축구"}}]};
var DAYS=["월","화","수","목","금","토","일"];
var GS=8*60,GE=20.5*60,PXMIN=0.85;
function mondayKey(d){var x=new Date(d);var w=(x.getDay()+6)%7;x.setDate(x.getDate()-w);return x.getFullYear()+"-"+("0"+(x.getMonth()+1)).slice(-2)+"-"+("0"+x.getDate()).slice(-2);}
var THIS_WEEK=mondayKey(new Date());
var WK_OPS=OVERRIDES[THIS_WEEK]||[];
var mode="week";
function toMin(t){var a=t.split(":");return (+a[0])*60+(+a[1]);}
function mItem(x,m){for(var k in m){if(x[k]!==m[k])return false;}return true;}
function effective(base,ops){
  var items=base.map(function(o){var c={};for(var k in o)c[k]=o[k];return c;}),removed=[];
  ops.forEach(function(o){
    if(o.op==="add"){var it={place:"",assumed:false,note:""};for(var k in o.item)it[k]=o.item[k];it._wk="add";items.push(it);}
    else if(o.op==="remove"){items=items.filter(function(x){if(mItem(x,o.match)){var g={};for(var k in x)g[k]=x[k];g._rm=true;removed.push(g);return false;}return true;});}
    else if(o.op==="update"){items.forEach(function(x){if(mItem(x,o.match)){for(var k in o.set)x[k]=o.set[k];x._wk="update";}});}
  });
  return {items:items,removed:removed};
}
function cur(){return mode==="week"?effective(DATA,WK_OPS):{items:DATA,removed:[]};}
function setMode(m){mode=m;document.getElementById("m-week").className=m==="week"?"on":"";document.getElementById("m-base").className=m==="base"?"on":"";build();}
function build(){
  var bar=document.getElementById("wkbar");
  if(mode==="week"&&WK_OPS.length){bar.style.display="block";bar.textContent="이번 주 변경 "+WK_OPS.length+"건 적용됨 (다음 주 자동 복귀)";}
  else if(mode==="week"){bar.style.display="block";bar.textContent="이번 주는 기본 시간표와 동일해요.";}
  else bar.style.display="none";
  document.getElementById("hdate").textContent=mode==="week"?("이번 주 ("+THIS_WEEK+" 주)"):"기본 시간표";
  var e=cur();
  var grid=document.getElementById("grid");grid.innerHTML="";
  var ch=document.createElement("div");ch.className="colhead";grid.appendChild(ch);
  DAYS.forEach(function(d,i){var h=document.createElement("div");h.className="colhead"+(i>4?" wknd":"");
    h.innerHTML=d+'<div class="lanehd"><div class="a">첫</div><div class="b">둘</div></div>';grid.appendChild(h);});
  var H=(GE-GS)*PXMIN;
  var tc=document.createElement("div");tc.className="timecol";tc.style.height=H+"px";
  for(var h=8;h<=20;h++){var y=(h*60-GS)*PXMIN;
    var l=document.createElement("div");l.className="hourline";l.style.top=y+"px";tc.appendChild(l);
    var lb=document.createElement("div");lb.className="hourlabel";lb.style.top=y+"px";lb.textContent=h;tc.appendChild(lb);}
  grid.appendChild(tc);
  DAYS.forEach(function(day){
    var col=document.createElement("div");col.className="daycol";col.style.height=H+"px";
    [["첫째","a"],["둘째","b"]].forEach(function(W){
      var lane=document.createElement("div");lane.className="lane "+W[1];lane.style.height=H+"px";
      for(var h=8;h<=20;h++){var l=document.createElement("div");l.className="hourline";l.style.top=(h*60-GS)*PXMIN+"px";lane.appendChild(l);}
      var arr=e.items.filter(function(x){return x.day===day&&x.who===W[0];}).map(function(x){return {a:x,sm:toMin(x.s),em:toMin(x.e),ghost:false};});
      if(mode==="week")e.removed.filter(function(x){return x.day===day&&x.who===W[0];}).forEach(function(x){arr.push({a:x,sm:toMin(x.s),em:toMin(x.e),ghost:true});});
      arr.forEach(function(o){
        var b=document.createElement("div");
        b.className="block"+(o.ghost?" ghost":((o.a.note&&o.a.note.indexOf("함께")>=0?" together":"")+(o.a._wk==="add"?" wkadd":"")));
        b.style.top=(o.sm-GS)*PXMIN+"px";b.style.height=Math.max((o.em-o.sm)*PXMIN-2,24)+"px";
        var tag=o.ghost?'<span class="wktag c">휴강</span>':(o.a._wk==="add"?'<span class="wktag">이번주</span>':(o.a._wk==="update"?'<span class="wktag">변경</span>':''));
        b.innerHTML='<div class="n">'+o.a.title+tag+'</div><div class="tm">'+o.a.s+'–'+o.a.e+'</div>';
        lane.appendChild(b);
      });
      col.appendChild(lane);
    });
    grid.appendChild(col);
  });
}
build();
</script>
</body>
</html>
