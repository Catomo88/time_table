name: Apply schedule requests
on:
  push:
    paths: [ "requests.json" ]
  workflow_dispatch:
permissions:
  contents: write
concurrency:
  group: apply-requests
  cancel-in-progress: false
jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install openpyxl
      - name: Apply requests via Gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python apply_requests.py
      - name: Regenerate xlsx and dashboards
        run: python build_grid.py
      - name: Commit and push if changed
        run: |
          if git diff --quiet; then echo "no changes"; exit 0; fi
          git config user.name "schedule-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "자동 반영: 시간표 변경 요청 처리 [skip ci]"
          git push
